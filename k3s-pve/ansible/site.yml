---
# site.yml — main entrypoint
# Usage:
#   ansible-playbook -i inventory/hosts.ini site.yml
#   ansible-playbook -i inventory/hosts.ini site.yml --tags kubeconfig
#   ansible-playbook -i inventory/hosts.ini site.yml --check (dry run)

# 1. Prep all nodes
- name: Common system prerequisites
  hosts: k3s_cluster
  gather_facts: true
  roles:
    - common

# 2. Bootstrap init server first (serial: 1 ensures ordering)
- name: Install k3s server nodes
  hosts: k3s_servers
  gather_facts: false
  serial: 1          # init node must finish before others join
  roles:
    - k3s_server

# 3. Join agent nodes
- name: Install k3s agent nodes
  hosts: k3s_agents
  gather_facts: false
  roles:
    - k3s_agent

# 4. Pull kubeconfig to local machine
- name: Fetch kubeconfig
  hosts: "{{ groups['k3s_servers'][0] }}"
  gather_facts: false
  tags: [kubeconfig]
  roles:
    - kubeconfig
