# Regenerate after `tofu apply` by running: bash gen-inventory.sh
# Or fill in IPs manually (DON"T)

[k3s_servers]
k3s-server-1 ansible_host=192.168.10.10 k3s_init_node=true
k3s-server-2 ansible_host=192.168.10.11
k3s-server-3 ansible_host=192.168.10.12

[k3s_agents]
k3s-agent-1 ansible_host=192.168.10.20
k3s-agent-2 ansible_host=192.168.10.21
k3s-agent-3 ansible_host=192.168.10.22

[k3s_cluster:children]
k3s_servers
k3s_agents

[k3s_cluster:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_python_interpreter=/usr/bin/python3
