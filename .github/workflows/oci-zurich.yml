name: "OCI Zurich"

on:
  push:
    branches: ["main"]
    paths:
      - "oci/zurich/**"
      - "oci/_modules/**"
      - "oci/root.hcl"
      - ".github/workflows/oci-zurich.yml"
  pull_request:
    paths:
      - "oci/zurich/**"
      - "oci/_modules/**"
      - "oci/root.hcl"
      - ".github/workflows/oci-zurich.yml"

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  TERRAGRUNT_VERSION: 1.0.0
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_app_terraform_io }}
  REGION: zurich

jobs:
  plan:
    name: "Plan - Zurich"
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: oci/zurich

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terragrunt
        run: |
          wget https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt
          terragrunt --version

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Terragrunt Init
        run: terragrunt init
        env:
          OCI_CLI_USER: ${{ secrets.OCI_ZURICH_USER }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_ZURICH_FINGERPRINT }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_ZURICH_TENANCY }}
          OCI_CLI_REGION: eu-zurich-1
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_ZURICH_KEY_CONTENT }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCI_ALERT_EMAIL: ${{ secrets.OCI_ALERT_EMAIL }}
          OCI_ZURICH_AD: ${{ secrets.OCI_ZURICH_AD }}
          OCI_ZURICH_COMPARTMENT_OCID: ${{ secrets.OCI_ZURICH_COMPARTMENT_OCID }}
          OCI_ZURICH_AMD_IMAGE_OCID: ${{ secrets.OCI_ZURICH_AMD_IMAGE_OCID }}
          OCI_ZURICH_ARM_IMAGE_OCID: ${{ secrets.OCI_ZURICH_ARM_IMAGE_OCID }}

      - name: Terragrunt Plan
        id: plan
        run: terragrunt plan -no-color
        continue-on-error: true
        env:
          OCI_CLI_USER: ${{ secrets.OCI_ZURICH_USER }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_ZURICH_FINGERPRINT }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_ZURICH_TENANCY }}
          OCI_CLI_REGION: eu-zurich-1
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_ZURICH_KEY_CONTENT }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCI_ALERT_EMAIL: ${{ secrets.OCI_ALERT_EMAIL }}
          OCI_ZURICH_AD: ${{ secrets.OCI_ZURICH_AD }}
          OCI_ZURICH_COMPARTMENT_OCID: ${{ secrets.OCI_ZURICH_COMPARTMENT_OCID }}
          OCI_ZURICH_AMD_IMAGE_OCID: ${{ secrets.OCI_ZURICH_AMD_IMAGE_OCID }}
          OCI_ZURICH_ARM_IMAGE_OCID: ${{ secrets.OCI_ZURICH_ARM_IMAGE_OCID }}

      - name: Terragrunt Apply
        id: apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terragrunt apply -auto-approve -input=false
        env:
          OCI_CLI_USER: ${{ secrets.OCI_ZURICH_USER }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_ZURICH_FINGERPRINT }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_ZURICH_TENANCY }}
          OCI_CLI_REGION: eu-zurich-1
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_ZURICH_KEY_CONTENT }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCI_ALERT_EMAIL: ${{ secrets.OCI_ALERT_EMAIL }}
          OCI_ZURICH_AD: ${{ secrets.OCI_ZURICH_AD }}
          OCI_ZURICH_COMPARTMENT_OCID: ${{ secrets.OCI_ZURICH_COMPARTMENT_OCID }}
          OCI_ZURICH_AMD_IMAGE_OCID: ${{ secrets.OCI_ZURICH_AMD_IMAGE_OCID }}
          OCI_ZURICH_ARM_IMAGE_OCID: ${{ secrets.OCI_ZURICH_ARM_IMAGE_OCID }}

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const plan = process.env.PLAN;
            
            const output = `## Terragrunt Plan - Zurich
            
            <details><summary>Show Plan</summary>
            
            \`\`\`
            ${plan}
            \`\`\`
            
            </details>
            
            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
