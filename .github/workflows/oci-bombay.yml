name: "OCI Bombay"

on:
  push:
    branches: ["main"]
    paths:
      - "oci/bombay/**"
      - "oci/_modules/**"
      - "oci/root.hcl"
  pull_request:
    paths:
      - "oci/bombay/**"
      - "oci/_modules/**"
      - "oci/root.hcl"
  issue_comment:
    types: [created]
  # Workflow is disabled by default - uncomment 'workflow_dispatch' to enable manual runs
  # workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  TERRAGRUNT_VERSION: 1.0.0
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_app_terraform_io }}
  REGION: bombay

jobs:
  plan:
    name: "Plan - Bombay"
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'issue_comment' &&
      false
    # NOTE: Bombay workflow is DISABLED (if: false)
    # To enable: Remove '&& false' from the if condition above
    # Also add the required secrets: OCI_BOMBAY_AD, OCI_BOMBAY_COMPARTMENT_OCID, etc.
    defaults:
      run:
        shell: bash
        working-directory: oci/bombay

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terragrunt
        run: |
          wget https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt
          terragrunt --version

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Terragrunt Init
        run: terragrunt init
        env:
          OCI_CLI_USER: ${{ secrets.OCI_BOMBAY_USER }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_BOMBAY_FINGERPRINT }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_BOMBAY_TENANCY }}
          OCI_CLI_REGION: ap-mumbai-1
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_BOMBAY_KEY_CONTENT }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCI_ALERT_EMAIL: ${{ secrets.OCI_ALERT_EMAIL }}
          OCI_BOMBAY_AD: ${{ secrets.OCI_BOMBAY_AD }}
          OCI_BOMBAY_COMPARTMENT_OCID: ${{ secrets.OCI_BOMBAY_COMPARTMENT_OCID }}
          OCI_BOMBAY_AMD_IMAGE_OCID: ${{ secrets.OCI_BOMBAY_AMD_IMAGE_OCID }}
          OCI_BOMBAY_ARM_IMAGE_OCID: ${{ secrets.OCI_BOMBAY_ARM_IMAGE_OCID }}

      - name: Terragrunt Plan
        id: plan
        run: terragrunt plan -no-color -out=tfplan
        continue-on-error: true
        env:
          OCI_CLI_USER: ${{ secrets.OCI_BOMBAY_USER }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_BOMBAY_FINGERPRINT }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_BOMBAY_TENANCY }}
          OCI_CLI_REGION: ap-mumbai-1
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_BOMBAY_KEY_CONTENT }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCI_ALERT_EMAIL: ${{ secrets.OCI_ALERT_EMAIL }}
          OCI_BOMBAY_AD: ${{ secrets.OCI_BOMBAY_AD }}
          OCI_BOMBAY_COMPARTMENT_OCID: ${{ secrets.OCI_BOMBAY_COMPARTMENT_OCID }}
          OCI_BOMBAY_AMD_IMAGE_OCID: ${{ secrets.OCI_BOMBAY_AMD_IMAGE_OCID }}
          OCI_BOMBAY_ARM_IMAGE_OCID: ${{ secrets.OCI_BOMBAY_ARM_IMAGE_OCID }}

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-bombay
          path: oci/bombay/tfplan
          retention-days: 5

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const plan = process.env.PLAN;
            
            const output = `## Terragrunt Plan - Bombay
            
            <details><summary>Show Plan</summary>
            
            \`\`\`
            ${plan}
            \`\`\`
            
            </details>
            
            **To apply, comment \`/apply bombay\`**
            
            *Actor: @${{ github.actor }}*`;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  apply:
    name: "Apply - Bombay"
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      github.event.comment.body == '/apply bombay' &&
      false
    # NOTE: Bombay workflow is DISABLED (if: false)
    # To enable: Remove '&& false' from the if condition above
    steps:
      - name: Add reaction
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Get PR branch
        id: pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('ref', pr.head.ref);

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.ref }}

      - name: Setup Terragrunt
        run: |
          wget https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Terragrunt Apply
        id: apply
        working-directory: oci/bombay
        run: terragrunt apply -auto-approve
        env:
          OCI_CLI_USER: ${{ secrets.OCI_BOMBAY_USER }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_BOMBAY_FINGERPRINT }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_BOMBAY_TENANCY }}
          OCI_CLI_REGION: ap-mumbai-1
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_BOMBAY_KEY_CONTENT }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCI_ALERT_EMAIL: ${{ secrets.OCI_ALERT_EMAIL }}
          OCI_BOMBAY_AD: ${{ secrets.OCI_BOMBAY_AD }}
          OCI_BOMBAY_COMPARTMENT_OCID: ${{ secrets.OCI_BOMBAY_COMPARTMENT_OCID }}
          OCI_BOMBAY_AMD_IMAGE_OCID: ${{ secrets.OCI_BOMBAY_AMD_IMAGE_OCID }}
          OCI_BOMBAY_ARM_IMAGE_OCID: ${{ secrets.OCI_BOMBAY_ARM_IMAGE_OCID }}

      - name: Comment Result
        if: always()
        uses: actions/github-script@v7
        env:
          OUTCOME: ${{ steps.apply.outcome }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const outcome = process.env.OUTCOME;
            const emoji = outcome === 'success' ? '✅' : '❌';
            
            const output = `## ${emoji} Apply ${outcome} - Bombay
            
            *Applied by: @${{ github.actor }}*`;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
